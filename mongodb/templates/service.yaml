# Adding service for Mongo db
# We are taking ClusterIP service as this communicate with internal POD's only
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    tier: database
    project: rosboshop
    component: mongodb

spec:
  selector:
    # selecting mongodb pod based on the below labels and add to the service
    tier: database
    project: rosboshop
    component: mongodb
  ports:
    - protocol: TCP
      port: 27017          # service port
      targetPort: 27017    # container port
